naftiko: "1.0.0-alpha1"

info:
  label: "Uptrace API"
  description: >-
    Uptrace open source APM API shared capability definition covering annotations,
    Prometheus metrics ingestion, PromQL querying, alert rule management,
    project management, and dashboard operations.
  tags:
    - Uptrace
    - APM
    - Observability
    - OpenTelemetry
    - Monitoring
    - Tracing
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      UPTRACE_API_TOKEN: UPTRACE_API_TOKEN

capability:
  consumes:
    - type: http
      namespace: uptrace
      baseUri: https://api.uptrace.dev
      description: "Uptrace APM REST API"
      authentication:
        type: bearer
        token: "{{UPTRACE_API_TOKEN}}"
      resources:
        - name: annotations
          path: /api/v1/annotations
          description: "Chart annotation management"
          operations:
            - name: list-annotations
              method: GET
              description: "List annotations for a project in a time range"
              inputParameters:
                - name: projectId
                  in: query
                  type: integer
                  required: true
                - name: startTime
                  in: query
                  type: string
                  required: false
                - name: endTime
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-annotation
              method: POST
              description: "Create a deployment or event annotation on dashboards"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  projectId: "{{tools.projectId}}"
                  name: "{{tools.name}}"
                  description: "{{tools.description}}"
                  tags: "{{tools.tags}}"
                  attrs: "{{tools.attrs}}"
                  time: "{{tools.time}}"

        - name: annotation
          path: /api/v1/annotations/{annotationId}
          description: "Individual annotation operations"
          operations:
            - name: get-annotation
              method: GET
              description: "Get annotation details"
              inputParameters:
                - name: annotationId
                  in: path
                  type: integer
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-annotation
              method: DELETE
              description: "Delete an annotation"
              inputParameters:
                - name: annotationId
                  in: path
                  type: integer
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: alerts
          path: /api/v1/alerts
          description: "Alert rule management"
          operations:
            - name: list-alerts
              method: GET
              description: "List alert rules for a project"
              inputParameters:
                - name: projectId
                  in: query
                  type: integer
                  required: true
                - name: state
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-alert
              method: POST
              description: "Create a new alert rule"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  projectId: "{{tools.projectId}}"
                  name: "{{tools.name}}"
                  type: "{{tools.alertType}}"
                  query: "{{tools.query}}"
                  forDuration: "{{tools.forDuration}}"
                  condition: "{{tools.condition}}"
                  notificationChannels: "{{tools.notificationChannels}}"

        - name: projects
          path: /api/v1/projects
          description: "Project management"
          operations:
            - name: list-projects
              method: GET
              description: "List all projects"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-project
              method: POST
              description: "Create a new Uptrace project"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  slug: "{{tools.slug}}"

        - name: project
          path: /api/v1/projects/{projectId}
          description: "Individual project operations"
          operations:
            - name: get-project
              method: GET
              description: "Get project details including DSN"
              inputParameters:
                - name: projectId
                  in: path
                  type: integer
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: dashboards
          path: /api/v1/dashboards
          description: "Dashboard management"
          operations:
            - name: list-dashboards
              method: GET
              description: "List dashboards for a project"
              inputParameters:
                - name: projectId
                  in: query
                  type: integer
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: uptrace-api
      resources:
        - path: /v1/annotations
          name: annotations
          operations:
            - method: GET
              name: list-annotations
              description: "List annotations"
              call: "uptrace.list-annotations"
              with:
                projectId: "rest.projectId"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-annotation
              description: "Create annotation"
              call: "uptrace.create-annotation"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/alerts
          name: alerts
          operations:
            - method: GET
              name: list-alerts
              description: "List alerts"
              call: "uptrace.list-alerts"
              with:
                projectId: "rest.projectId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: uptrace-mcp
      transport: http
      tools:
        - name: list-annotations
          description: "List chart annotations for an Uptrace project"
          hints:
            readOnly: true
            openWorld: false
          call: "uptrace.list-annotations"
          with:
            projectId: "tools.projectId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-annotation
          description: "Create a deployment or event annotation on Uptrace dashboards"
          hints:
            readOnly: false
            openWorld: false
          call: "uptrace.create-annotation"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-alerts
          description: "List alert rules for an Uptrace project"
          hints:
            readOnly: true
            openWorld: false
          call: "uptrace.list-alerts"
          with:
            projectId: "tools.projectId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-projects
          description: "List all Uptrace projects"
          hints:
            readOnly: true
            openWorld: false
          call: "uptrace.list-projects"
          outputParameters:
            - type: object
              mapping: "$."
