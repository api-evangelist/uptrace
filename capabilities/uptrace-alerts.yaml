naftiko: 1.0.0-alpha2
info:
  label: Uptrace API — Alerts
  description: 'Uptrace API — Alerts. 5 operations. Lead operation: List Alerts. Self-contained Naftiko capability covering
    one Uptrace business surface.'
  tags:
  - Uptrace
  - Alerts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    UPTRACE_API_KEY: UPTRACE_API_KEY
capability:
  consumes:
  - type: http
    namespace: uptrace-alerts
    baseUri: https://api.uptrace.dev
    description: Uptrace API — Alerts business capability. Self-contained, no shared references.
    resources:
    - name: api-v1-alerts
      path: /api/v1/alerts
      operations:
      - name: listalerts
        method: GET
        description: List Alerts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectId
          in: query
          type: integer
          description: Project identifier
          required: true
        - name: state
          in: query
          type: string
          description: Filter by alert state
      - name: createalert
        method: POST
        description: Create Alert
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-v1-alerts-alertId
      path: /api/v1/alerts/{alertId}
      operations:
      - name: getalert
        method: GET
        description: Get Alert
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: alertId
          in: path
          type: integer
          required: true
      - name: updatealert
        method: PUT
        description: Update Alert
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: alertId
          in: path
          type: integer
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletealert
        method: DELETE
        description: Delete Alert
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: alertId
          in: path
          type: integer
          required: true
    authentication:
      type: bearer
      token: '{{env.UPTRACE_API_KEY}}'
  exposes:
  - type: rest
    namespace: uptrace-alerts-rest
    port: 8080
    description: REST adapter for Uptrace API — Alerts. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/api/v1/alerts
      name: api-v1-alerts
      description: REST surface for api-v1-alerts.
      operations:
      - method: GET
        name: listalerts
        description: List Alerts
        call: uptrace-alerts.listalerts
        with:
          projectId: rest.projectId
          state: rest.state
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createalert
        description: Create Alert
        call: uptrace-alerts.createalert
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v1/alerts/{alertid}
      name: api-v1-alerts-alertid
      description: REST surface for api-v1-alerts-alertId.
      operations:
      - method: GET
        name: getalert
        description: Get Alert
        call: uptrace-alerts.getalert
        with:
          alertId: rest.alertId
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatealert
        description: Update Alert
        call: uptrace-alerts.updatealert
        with:
          alertId: rest.alertId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletealert
        description: Delete Alert
        call: uptrace-alerts.deletealert
        with:
          alertId: rest.alertId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: uptrace-alerts-mcp
    port: 9090
    transport: http
    description: MCP adapter for Uptrace API — Alerts. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-alerts
      description: List Alerts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: uptrace-alerts.listalerts
      with:
        projectId: tools.projectId
        state: tools.state
      outputParameters:
      - type: object
        mapping: $.
    - name: create-alert
      description: Create Alert
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: uptrace-alerts.createalert
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-alert
      description: Get Alert
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: uptrace-alerts.getalert
      with:
        alertId: tools.alertId
      outputParameters:
      - type: object
        mapping: $.
    - name: update-alert
      description: Update Alert
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: uptrace-alerts.updatealert
      with:
        alertId: tools.alertId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-alert
      description: Delete Alert
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: uptrace-alerts.deletealert
      with:
        alertId: tools.alertId
      outputParameters:
      - type: object
        mapping: $.
