aid: uptrace
name: Uptrace
description: >-
  Uptrace is an open source APM and distributed tracing platform powered by OpenTelemetry for monitoring application
  traces, metrics, and logs. The Uptrace API provides programmatic access to annotations, Prometheus metrics ingestion,
  PromQL querying, alert rules, project management, and dashboards.
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
