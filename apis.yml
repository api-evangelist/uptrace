modified: '2026-05-03'
specificationVersion: '0.19'
apis:
  - aid: uptrace:uptrace
    name: Uptrace API
    description: >-
      The Uptrace REST API provides programmatic management of projects,
      chart annotations for deployment tracking, alert rules using PromQL,
      dashboard management, and Prometheus Remote Write for metrics ingestion.
      Uptrace accepts OpenTelemetry data via OTLP/gRPC and OTLP/HTTP.
    humanURL: https://uptrace.dev
    baseURL: https://api.uptrace.dev
