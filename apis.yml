aid: uptrace
name: Uptrace
description: >-
  Uptrace is an open source APM and distributed tracing platform powered by
  OpenTelemetry for monitoring application traces, metrics, and logs. The
  Uptrace API provides programmatic access to annotations, Prometheus metrics
  ingestion, PromQL querying, alert rules, project management, and dashboards.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
